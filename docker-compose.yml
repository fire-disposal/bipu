version: '3.8'

# 主Docker Compose配置文件
# 包含所有服务的统一管理

services:
  # 可以在这里添加前端服务等其他服务
  
# 网络配置
networks:
  bipupu-net:
    driver: bridge

# 数据卷配置
volumes:
  pg_data:
    name: bipupu_pg_data
  redis_data:
    name: bipupu_redis_data
  upload_data:
    name: bipupu_uploads
  logs_data:
    name: bipupu_logs