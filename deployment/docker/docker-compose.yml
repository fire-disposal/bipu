version: '3.8'

services:
  # ----------------------------------------------------
  # 1. FastAPI Backend Service
  # ----------------------------------------------------
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: bipupu-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads
      - logs_data:/app/logs
    networks:
      - bipupu-net
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ----------------------------------------------------
  # 2. Celery Worker Service
  # ----------------------------------------------------
  celery-worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: bipupu-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - logs_data:/app/logs
    networks:
      - bipupu-net

  # ----------------------------------------------------
  # 3. Celery Beat Service
  # ----------------------------------------------------
  celery-beat:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: bipupu-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: beat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - logs_data:/app/logs
    networks:
      - bipupu-net

  # ----------------------------------------------------
  # 4. PostgreSQL Database
  # ----------------------------------------------------
  db:
    image: postgres:15
    container_name: bipupu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bipupu
      TZ: Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - bipupu-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ----------------------------------------------------
  # 5. Redis Cache/Broker
  # ----------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: bipupu-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - bipupu-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a ${REDIS_PASSWORD} ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ----------------------------------------------------
  # 6. Nginx Reverse Proxy
  # ----------------------------------------------------
  nginx:
    image: nginx:stable-alpine
    container_name: bipupu-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8084:80"
    volumes:
      - ../../nginx_conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - upload_data:/app/uploads:ro
    networks:
      - bipupu-net

# ----------------------------------------------------
# Named Volumes and Network Configuration
# ----------------------------------------------------
volumes:
  pg_data:
    name: bipupu_pg_data
  redis_data:
    name: bipupu_redis_data
  upload_data:
    name: bipupu_uploads
  logs_data:
    name: bipupu_logs

networks:
  bipupu-net:
    driver: bridge