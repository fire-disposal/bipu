# 注意：此文件用于本地开发，会覆盖 docker-compose.yml 中的同名配置
services:
  # ----------------------------------------------------
  # 1. FastAPI Backend Service (backend)
  # ----------------------------------------------------
  backend:
    image: fastapi-backend:local
    build:
      context: .
    
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "3", "--reload"]

    volumes:
      - ./app:/app/app
      - upload_data:/app/uploads
      - logs_data:/app/logs

  # ----------------------------------------------------
  # 2. Celery Worker Service
  # ----------------------------------------------------
  celery-worker:
    image: fastapi-backend:local
    build:
      context: .
    
    command: celery -A app.celery_app worker --loglevel=info -Q default -c 4 

  # ----------------------------------------------------
  # 3. Celery Beat Service
  # ----------------------------------------------------
  celery-beat:
    image: fastapi-backend:local
    build:
      context: .
        
    command: celery -A app.celery_app beat -l info --pidfile=/app/logs/celerybeat.pid --schedule=/app/logs/celerybeat-schedule
    
  # ----------------------------------------------------
  # 6. Nginx Reverse Proxy
  # ----------------------------------------------------
  nginx:
    ports:
      - "8084:80" 
    volumes:
      - ./nginx_conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - upload_data:/app/uploads:ro