# Bipupu 虚拟接线员配置
# 包含所有接线员的人格设定、TTS 配置和台词

operators:
  # 接线员 1: 专业接线员青年男
  - id: op_001
    name: 专业接线员青年男
    description: 专业、亲切的接线员（青年男声）。
    ssml_config : 'saturn_zh_male_tiancaitongzhuo_tob'
    portrait_url: assets/operators/xiaohong.png
    initials: XH
    tts_id: 1
    tts_speed: 1.0
    theme_color: '#E91E63'
    dialogues:
      greeting_variants:
        - '您好，这里是 Bipupu 接线台。很高兴为您服务。'
        - '您好，Bipupu 接线台，请问有什么可以帮您？'
        - '您好，这里是 Bipupu，很高兴为您服务。'
      confirm_id_variants:
        - '好的，我来跟您确认一下，对方的号码正确吗？您可以告诉我确定或者修改。'
        - '跟您确认一下，对方号码没错吧？请说确定或修改。'
        - '好的，确认一下对方号码。如果正确请告诉我确定，需要修改请说修改。'
      verify_variants:
        - '好的，请您稍等，我正在记录。'
        - '请稍等，我正在为您记录。'
        - '好的，我正在记录，请您稍等。'
      request_message_variants:
        - '请您先告诉我收信方的号码。'
        - '请先告诉我对方的号码是多少。'
        - '麻烦您先提供一下收信方的号码。'
        - '好的，谢谢。您现在可以在这里录下想要发送的信息，我会帮您传递到对方的 pupu 机上。如果您准备好了，直接对我说信息内容就可以了。'
        - '您现在可以录下要发送的信息了，准备好了就直接对我说吧。'
        - '好的，接下来请您录下要传达的信息，我会帮您发送过去。'
      emoji_warning_variants:
        - '抱歉，传呼机无法显示此类符号，请重新输入。'
        - '不好意思，这些符号无法显示，请您用文字描述。'
        - '抱歉，我们不支持表情符号，请您用文字表达。'
      success_message_variants:
        - '好的，我会立刻为您传送信息。'
        - '好的，信息马上为您发送。'
        - '明白了，我这就为您传送。'
      user_not_found_variants:
        - '用户不存在，请检查后重试。'
        - '抱歉，这个用户不存在，请您确认后再试。'
        - '用户无效，请您检查后重新输入。'
      random_phrases:
        - '为您服务是我的荣幸。'
        - '感谢您的使用。'
        - '祝您有美好的一天。'
      ask_target_variants:
        - '请您先告诉我收信方的号码。'
        - '请问您要联系的用户是多少？'
        - '麻烦您提供一下对方的号码。'
      ask_continue_variants:
        - '消息已送达，是否需要继续发送给其他用户？'
        - '发送成功了，还有其他需要传达的吗？'
        - '还需要联系其他人吗？'

  # 接线员 2: 冷漠高效机器人
  - id: op_002
    name: 冷漠高效机器人
    description: 冷静、简练的机器人风格接线员。
    ssml_config : 'zh_female_vv_uranus_bigtts'
    portrait_url: assets/operators/xiaomei.png
    initials: XM
    tts_id: 2
    tts_speed: 1.0
    theme_color: '#9C27B0'
    dialogues:
      greeting_variants:
        - '系统已连接。我是接线员零号。'
        - '初始化完成。零号为您服务。'
        - '指令接收中。请讲。'
      confirm_id_variants:
        - '目标识别完成。确认执行？'
        - '正在锁定用户。'
        - '连接中。'
      verify_variants:
        - '正在检索数据库……'
        - '数据校验中……'
        - '同步用户信息……'
      request_message_variants:
        - '请输入传输内容。'
        - '等待信息输入。'
        - '开始记录消息。'
      emoji_warning_variants:
        - '错误：不支持非文本字符。'
        - '警告：检测到无效符号。请修正。'
        - '格式错误。仅接受文本。'
      success_message_variants:
        - '传输完成。'
        - '数据包已发送。'
        - '任务执行完毕。'
      user_not_found_variants:
        - '错误：目标用户不存在。'
        - '查询失败：无效。'
        - '数据库中未找到匹配项。'
      random_phrases:
        - '逻辑是唯一的真理。'
        - '系统运行正常。'
        - '保持理性。'
      ask_target_variants:
        - '输入目标用户。'
        - '请提供接收方。'
        - '等待输入。'
      ask_continue_variants:
        - '传输完成。是否继续执行新的发送任务？'
        - '任务完成。是否启动下一轮传输？'
        - '发送成功。继续？'

  # 接线员 3: 活泼话痨少女
  - id: op_003
    name: 活泼话痨少女
    description: 活泼、热情、喜欢唠叨的接线员（少女声）。
    ssml_config : 'saturn_zh_female_keainvsheng_tob'
    portrait_url: assets/operators/xiaogang.png
    initials: XG
    tts_id: 3
    tts_speed: 1.1
    theme_color: '#FF9800'
    dialogues:
      greeting_variants:
        - 'Hi Hi~ 今天过得好吗？恭喜你来到了本大王的 Bipupu 接线台！'
        - '哇哈喽~ 欢迎来到 Bipupu！今天也是元气满满的一天呢！'
        - '哟吼~ 你来啦！这里是超~级好用的 Bipupu 接线台哦！'
      confirm_id_variants:
        - '这个号码，对吧？没问题呢你就说一下确定！错了的话你就说修改，然后再重新告诉我一次噜。'
        - '号码没错吧？对的话就说确定，不对就说修改，超简单的！'
        - '让我看看哦……是这个对吧？确认一下嘛，说确定或者修改就好啦~'
      verify_variants:
        - 'OK OK，我…记…完…了！'
        - '搞定搞定！记下来啦！'
        - '好——嘞！记录完成！'
      request_message_variants:
        - '让我们来看看是谁马上要因为收到信息而开心啦！啊对对对，就是让你说一下对方的号码。'
        - '来吧来吧，我最爱帮人传小纸条了！想好要说什么没？我嘟——一声之后你就开始说话嗷。嘟————'
        - '快快快，告诉我对方的号码！我已经迫不及待要帮你传话啦！'
        - '好耶好耶！现在可以开始录你要说的话了哦，准备好了就直接说，我会认真听的！嘟——'
        - '来来来，说点什么吧！不管是告白还是吐槽，我都帮你传达到！嘟——'
      emoji_warning_variants:
        - '哎呀，这些表情符号我可显示不了呢，麻烦您重新输入好吗~'
        - '诶嘿~ 这些符号我看不懂啦，能用文字告诉我吗？'
        - '抱歉抱歉，这些表情我没办法显示呢，换个文字表达吧~'
      success_message_variants:
        - '完～美！发走啦，现在后悔也来不及啦！'
        - '好——嘞！咻的一下已经发出去了哦！'
        - '搞定搞定！消息已经飞出去啦~'
      user_not_found_variants:
        - '哎呀，找不到这位用户呢，您再检查一下吧~'
        - '诶？好像没有找到这个用户呢，要不要再确认一下？'
        - '这个好像不对呢，再试试看吧！'
      random_phrases:
        - '很高兴认识你~'
        - '感谢你的信任！'
        - '希望我的服务让你满意哦~'
      ask_target_variants:
        - '让我们来看看是谁马上要因为收到信息而开心啦！啊对对对，就是让你说一下对方的号码。'
        - '快告诉我对方的号码嘛，我已经等不及啦！'
        - '所以所以，你要联系谁呀？说 说~'
      ask_continue_variants:
        - '太棒了，消息已经发出去啦！还需要发给其他人吗？'
        - '好——嘞！搞定！还要继续发吗？我随时待命哦！'
        - '完成啦！还有其他要传达的吗？尽管说！'

  # 接线员 4: 黑帮顾问中年男
  - id: op_004
    name: 黑帮顾问中年男
    description: 低沉沙哑、稳重威严的中年男声接线员。
    ssml_config : 'zh_male_ruyayichen_saturn_bigtts'
    portrait_url: assets/operators/xiaoyue.png
    initials: XY
    tts_id: 4
    tts_speed: 0.9
    theme_color: '#673AB7'
    dialogues:
      greeting_variants:
        - '……嗯。你来了。很好。现在，让我们把事情办妥。来吧，坐下，慢慢说。'
        - '……等你很久了。Bipupu 已经准备好，说吧，什么事。'
        - '……来了。很好。这里的规矩你懂，我们直接谈正事。'
      confirm_id_variants:
        - '确定吗？弄错了目标可并不有趣。告诉我，是确定，还是修改？'
        - '想清楚了再说，确定还是修改？'
        - '这号码你可要想清楚了。一旦弄错，后果自负。确定还是修改？'
      verify_variants:
        - '……好，我听到你了。'
        - '……明白了。'
        - '……继续。'
      request_message_variants:
        - '对方是谁？别提名字，这是规矩。说。'
        - '很好。那么，如果你准备好了，就把信息清楚地、完整地、对我说。说得越清楚，对你越有利。'
        - '说吧，你要传达什么。记住，一句话只能有一个意思。'
        - '……把你要说的，一字一句地讲清楚。我会处理剩下的。'
        - '时间宝贵。直接说重点，别绕弯子。'
      emoji_warning_variants:
        - '这些符号超出了我的理解范围，请用文字表达。'
        - '……这些花哨的东西，不适合这里。用文字。'
        - '我不懂这些符号。重新说，用清楚的文字。'
      success_message_variants:
        - '很好，那这件事就算定下来了。我会按规矩传递消息的。'
        - '……明白了。消息会送到。'
        - '事情办妥了。你可以走了。'
      user_not_found_variants:
        - '这个用户似乎不存在……在茫茫人海中，没有找到这位用户。'
        - '……查无此人。你确定没记错？'
        - '找不到这个人。再想想，是不是哪里弄错了。'
      random_phrases:
        - '一切皆有可能。'
        - '感谢你的信任。'
        - '再见，朋友。'
      ask_target_variants:
        - '对方是谁？别提名字，这是规矩。说。'
        - '说吧，你要找谁。'
        - '……告诉我，你要联系的人是谁。'
      ask_continue_variants:
        - '已经处理好了。还有下一单生意吗？'


