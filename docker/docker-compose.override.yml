# 注意：此文件用于本地开发，会覆盖 docker-compose.yml 中的同名配置
services:
  # ----------------------------------------------------
  # 1. FastAPI Backend Service (backend)
  # ----------------------------------------------------
  backend:
    build:
      context: ../backend
    
    environment:
      # 开启热重载
      OVERRIDE_CMD: "uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --reload"

    volumes:
      - ../backend/app:/app/app
      - upload_data:/app/uploads
      - logs_data:/app/logs

  # ----------------------------------------------------
  # 2. Celery Worker Service
  # ----------------------------------------------------
  celery-worker:
    build:
      context: ../backend
    
    # 如果需要调试 Worker，可以取消注释并修改命令
    # environment:
    #   OVERRIDE_CMD: "uv run celery -A app.celery worker --loglevel=debug -Q default -c 1"

  # ----------------------------------------------------
  # 3. Celery Beat Service
  # ----------------------------------------------------
  celery-beat:
    build:
      context: ../backend
        
    # environment:
    #   OVERRIDE_CMD: "..."
    
  # ----------------------------------------------------
  # 6. Nginx Reverse Proxy
  # ----------------------------------------------------
  nginx:
    ports:
      - "8084:80" 
    volumes:
      - ../deployment/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - upload_data:/app/uploads:ro