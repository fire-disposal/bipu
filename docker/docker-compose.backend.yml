services:
  # ----------------------------------------------------
  # 1. FastAPI Backend Service (backend)
  # ----------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bipupu-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # FastAPI配置
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-false}
      
      # 数据库和缓存配置
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bipupu}
      DATABASE_URL: ${DATABASE_URL}
      
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      
      # 时区
      TZ: Asia/Shanghai

    volumes:
      # 上传文件和日志持久化
      - upload_data:/app/uploads
      - logs_data:/app/logs
    networks:
      - bipupu-net

    # 后端健康检查
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
      
  # ----------------------------------------------------
  # 2. Celery Worker Service
  # ----------------------------------------------------
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bipupu-celery-worker
    restart: unless-stopped 
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CONTAINER_ROLE: worker 
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-false}
      
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bipupu}
      DATABASE_URL: ${DATABASE_URL}
      
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      
      TZ: Asia/Shanghai
    volumes:
      - logs_data:/app/logs
    networks:
      - bipupu-net

  # ----------------------------------------------------
  # 3. Celery Beat Service
  # ----------------------------------------------------
  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bipupu-celery-beat
    restart: unless-stopped
    depends_on:
      db:
      
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bipupu}
      DATABASE_URL: ${DATABASE_URL}
      
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      
      TZ: Asia/Shanghai
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/bipupu}
      REDIS_URL: ${REDIS_URL:-redis://:redis_password@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis_password@redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis_password@redis:6379/2}
      TZ: Asia/Shanghai
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
    volumes:
      - logs_data:/app/logs
    networks:
      - bipupu-net

  # ----------------------------------------------------
  # 4. PostgreSQL Database (db)
  # ----------------------------------------------------
  db:
    image: postgres:15
    container_name: bipupu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bipupu}
      TZ: Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - bipupu-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ----------------------------------------------------
  # 5. Redis Cache/Broker (redis)
  # ----------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: bipupu-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_password}"]
    volumes:
      - redis_data:/data
    networks:
      - bipupu-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a ${REDIS_PASSWORD:-redis_password} ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
      
  # ----------------------------------------------------
  # 6. Nginx Reverse Proxy
  # ----------------------------------------------------
  nginx:
    image: fastapi-nginx:local
    build:
      context: ../deployment/nginx
    container_name: bipupu-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8084:80"
    volumes:
      - ../deployment/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - upload_data:/app/uploads:ro
    networks:
      - bipupu-net

# ----------------------------------------------------
# Named Volumes and Network Configuration
# ----------------------------------------------------
volumes:
  pg_data:
    name: bipupu_pg_data
  redis_data:
    name: bipupu_redis_data
  upload_data:
    name: bipupu_uploads
  staticfiles_data:
    name: bipupu_staticfiles
  logs_data:
    name: bipupu_logs

networks:
  bipupu-net:
    driver: bridge