gname: fastapi后端部署

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "部署原因"
        required: false
        default: "手动触发部署"
      clean_redis:
        description: "是否在部署前清理 Redis（仅清理匹配 key，慎用，true/false）"
        required: false
        default: "false"

env:
  IMAGE_BASE: ghcr.io/${{ github.repository }}/bipupu-backend

jobs:
  deploy:
    name: 🏗️ 编译并部署
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 获取源代码
        uses: actions/checkout@v4

      - name: 🛠️ 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 登录 GitHub 镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ 生成版本标签
        id: ver
        run: |
          TAG_FINAL="${GITHUB_SHA:0:8}"
          echo "BACKEND_IMAGE=${{ env.IMAGE_BASE }}:$TAG_FINAL" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG_FINAL" >> "$GITHUB_OUTPUT"

      - name: 📦 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ver.outputs.BACKEND_IMAGE }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔑 配置 SSH 密钥
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: 🚀 开启 SSH 多路复用
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host bipupu-server
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            ControlMaster auto
            ControlPath ~/.ssh/ssh-%r@%h:%p
            ControlPersist 10m
          EOF

      - name: 💾 备份与预处理
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 -T bipupu-server 'sh -s' <<'SSH_SCRIPT'
          set -e
          mkdir -p ~/bipupu-backups ~/bipupu-compose
          # 备份当前镜像名用于回滚
          CURRENT_IMAGE=$(docker inspect --format='{{.Config.Image}}' bipupu-backend 2>/dev/null || echo "")
          [ -n "$CURRENT_IMAGE" ] && echo "$CURRENT_IMAGE" > ~/bipupu-backups/last-image.txt
          # 备份当前的 compose 文件
          [ -f ~/bipupu-compose/docker-compose.yml ] && cp ~/bipupu-compose/docker-compose.yml ~/bipupu-backups/compose-bak.yml
          SSH_SCRIPT

      - name: 📦 推送 Docker Compose 配置
        run: |
          # 仅推送主配置文件
          scp backend/docker/docker-compose.yml bipupu-server:~/bipupu-compose/

      - name: 🧹 可选：在服务器上安全清理 Redis
        if: ${{ github.event.inputs.clean_redis == 'true' }}
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 -T bipupu-server 'sh -s' <<'SSH_CLEAN'
          set -e
          # 列出将被删除的 key（仅用于记录）
          echo "Listing keys matching 'user_auth:*' in Redis:"
          docker compose -p bipupu-backend exec -T redis sh -c "redis-cli --scan --pattern 'user_auth:*' || true"

          # 实际删除：使用容器内 redis-cli 的 SCAN + xargs 删除匹配的键，避免使用 FLUSHALL
          echo "Deleting keys matching 'user_auth:*'..."
          docker compose -p bipupu-backend exec -T redis sh -c "redis-cli --scan --pattern 'user_auth:*' | xargs -r -n1 redis-cli del || true"

          echo "Redis cleanup completed."
          SSH_CLEAN

      - name: 🚀 执行部署 (变量注入)
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 -T bipupu-server 'sh -s' <<SSH_DEPLOY
          set -e
          cd ~/bipupu-compose

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # 敏感变量注入
          export SECRET_KEY="${{ secrets.SECRET_KEY }}"
          export ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}"
          export ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}"
          export BACKEND_IMAGE="${{ steps.ver.outputs.BACKEND_IMAGE }}"

          # 启动服务，不依赖 .env 和 prod 文件
          docker compose -p bipupu-backend up -d --remove-orphans
          SSH_DEPLOY

      - name: 🩺 健康检查
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 -T bipupu-server 'sh -s' <<'SSH_HEALTH'
          i=1
          while [ "$i" -le 10 ]; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' bipupu-backend 2>/dev/null || echo "not-found")
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ 服务已就绪"
              exit 0
            fi
            echo "⏳ 等待服务启动... ($i/10)"
            sleep 10
            i=$((i+1))
          done
          exit 1
          SSH_HEALTH

      - name: 🔄 自动回滚
        if: failure()
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 -T bipupu-server 'sh -s' <<SSH_ROLLBACK
          set -e
          if [ -f ~/bipupu-backups/last-image.txt ]; then
            PREVIOUS_IMAGE=$(cat ~/bipupu-backups/last-image.txt)
            [ -f ~/bipupu-backups/compose-bak.yml ] && cp ~/bipupu-backups/compose-bak.yml ~/bipupu-compose/docker-compose.yml

            cd ~/bipupu-compose
            export SECRET_KEY="${{ secrets.SECRET_KEY }}"
            export ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}"
            export ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}"
            export BACKEND_IMAGE="\$PREVIOUS_IMAGE"

            docker compose -p bipupu-backend up -d
            echo "🔄 已回滚至上次稳定版本"
          fi
          SSH_ROLLBACK

      - name: 🧹 清理旧镜像
        if: always()
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 -T bipupu-server "docker image prune -f --filter 'until=48h'"
