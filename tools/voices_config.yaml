# Bipupu 接线员语音台词配置
#
# 此文件是接线员台词的唯一事实来源，同时供：
#   1. generate_voices.py  ——  批量生成预录制语音资源
#   2. （可选）Dart 运行时读取，替代硬编码
#
# 命名约定：
#   assets/voices/{op_id}/{line_key}_{variant_index}.mp3
#
# 含 %s 占位符的台词（confirmId 等）不做预录制，运行时由 TTS 后端处理。
#
# edge-tts 语音参考：
#   https://speech.microsoft.com/portal/voicegallery
#   zh-CN-YunxiNeural      青年男，亲切自然
#   zh-CN-YunyangNeural    新闻播音男，正式中性
#   zh-CN-YunjianNeural    成熟男，浑厚有力
#   zh-CN-XiaochenNeural   青年女，活泼开朗
#   zh-CN-XiaoxiaoNeural   青年女，温柔自然（默认最佳）
#   zh-CN-XiaoyuNeural     专业女，沉稳清晰

output_dir: "../mobile/assets/voices"   # 相对于本脚本所在目录

operators:

  op_001:
    name: 专业接线员青年男
    edge_tts_voice: zh-CN-YunxiNeural
    rate: "+0%"
    pitch: "+0Hz"
    volume: "+0%"
    dialogues:
      greeting:
        - "您好，这里是 Bipupu 接线台。很高兴为您服务。"
        - "您好，Bipupu 接线台，请问有什么可以帮您？"
        - "您好，这里是 Bipupu，很高兴为您服务。"
      ask_target:
        - "请您先告诉我收信方的号码。"
        - "请问您要联系的用户 ID 是多少？"
        - "麻烦您提供一下对方的号码。"
      # confirm_id 含 %s，运行时由 TTS 处理，此处不预录
      request_message:
        - "您现在可以在这里录下想要发送的信息，我会帮您传递到对方的 pupu 机上。如果您准备好了，直接对我说信息内容就可以了。"
        - "您现在可以录下要发送的信息了，准备好了就直接对我说吧。"
        - "好的，接下来请您录下要传达的信息，我会帮您发送过去。"
      user_not_found:
        - "用户不存在，请检查 ID 后重试。"
        - "抱歉，这个 ID 对应的用户不存在，请您确认后再试。"
        - "该用户 ID 无效，请您检查后重新输入。"
      success_message:
        - "好的，我会立刻为您传送信息。"
        - "好的，信息马上为您发送。"
        - "明白了，我这就为您传送。"
      ask_continue:
        - "消息已送达，是否需要继续发送给其他用户？"
        - "发送成功了，还有其他需要传达的吗？"
        - "还需要联系其他人吗？"
      random_phrase:
        - "为您服务是我的荣幸。"
        - "感谢您的使用。"
        - "祝您有美好的一天。"

  op_002:
    name: 冷漠高效机器人
    edge_tts_voice: zh-CN-YunyangNeural
    rate: "+5%"
    pitch: "-2Hz"
    volume: "+0%"
    dialogues:
      greeting:
        - "连接建立。Bipupu 接线系统待命。"
        - "系统已启动。Bipupu 接线服务就绪。"
        - "连接成功。等待指令。"
      ask_target:
        - "收信方 ID 录入。"
        - "输入目标用户 ID。"
        - "请提供接收方 ID。"
      request_message:
        - "如提供信息，我将执行传输。请在嘟声后说出信息。"
        - "信息录入阶段。请开始讲述。"
        - "准备接收信息。请讲。"
      user_not_found:
        - "错误：目标用户不存在。"
        - "查询失败：无效的 ID。"
        - "数据库中未找到匹配项。"
      success_message:
        - "传输已执行。"
        - "发送完成。"
        - "任务执行完毕。"
      ask_continue:
        - "传输完成。是否继续？"
        - "任务完成。是否启动下一轮？"
        - "发送成功。继续？"
      random_phrase:
        - "系统运行正常。"
        - "保持理性。"
        - "逻辑是唯一的真理。"

  op_003:
    name: 活泼话痨少女
    edge_tts_voice: zh-CN-XiaochenNeural
    rate: "+10%"
    pitch: "+2Hz"
    volume: "+0%"
    dialogues:
      greeting:
        - "Hi Hi~ 今天过得好吗？恭喜你来到了本大王的 Bipupu 接线台！"
        - "哇哈喽~ 欢迎来到 Bipupu！今天也是元气满满的一天呢！"
        - "哟吼~ 你来啦！这里是超~级好用的 Bipupu 接线台哦！"
      ask_target:
        - "让我们来看看是谁马上要因为收到信息而开心啦！啊对对对，就是让你说一下对方的号码。"
        - "快告诉我对方的号码嘛，我已经等不及啦！"
        - "所以所以，你要联系谁呀？说 ID 说 ID~"
      request_message:
        - "来吧来吧，我最爱帮人传小纸条了！想好要说什么没？准备好了就直接说，我会认真听的！"
        - "好耶好耶！现在可以开始录你要说的话了哦，准备好了就直接说！"
        - "来来来，说点什么吧！不管是告白还是吐槽，我都帮你传达到！"
      user_not_found:
        - "哎呀，找不到这位用户呢，您再检查一下 ID 吧~"
        - "诶？好像没有找到这个用户呢，要不要再确认一下？"
        - "这个 ID 好像不对呢，再试试看吧！"
      success_message:
        - "完～美！发走啦，现在后悔也来不及啦！"
        - "好——嘞！咻的一下已经发出去了哦！"
        - "搞定搞定！消息已经飞出去啦~"
      ask_continue:
        - "太棒了，消息已经发出去啦！还需要发给其他人吗？"
        - "好——嘞！搞定！还要继续发吗？我随时待命哦！"
        - "完成啦！还有其他要传达的吗？尽管说！"
      random_phrase:
        - "很高兴认识你~"
        - "感谢你的信任！"
        - "希望我的服务让你满意哦~"

  op_004:
    name: 黑帮顾问中年男
    edge_tts_voice: zh-CN-YunjianNeural
    rate: "-10%"
    pitch: "-3Hz"
    volume: "+0%"
    dialogues:
      greeting:
        - "……嗯。你来了。很好。现在，让我们把事情办妥。来吧，坐下，慢慢说。"
        - "……等你很久了。Bipupu 已经准备好，说吧，什么事。"
        - "……来了。很好。这里的规矩你懂，我们直接谈正事。"
      ask_target:
        - "对方是谁？别提名字，这是规矩。说 ID。"
        - "说吧，你要找谁。ID。"
        - "……告诉我，你要联系的人是谁。用 ID 说话。"
      request_message:
        - "很好。那么，如果你准备好了，就把信息清楚地、完整地、对我说。说得越清楚，对你越有利。"
        - "说吧，你要传达什么。记住，一句话只能有一个意思。"
        - "……把你要说的，一字一句地讲清楚。我会处理剩下的。"
      user_not_found:
        - "这个用户似乎不存在……在茫茫人海中，没有找到这位用户。"
        - "……这个 ID，查无此人。你确定没记错？"
        - "找不到这个人。再想想，是不是哪里弄错了。"
      success_message:
        - "很好，那这件事就算定下来了。我会按规矩传递消息的。"
        - "……明白了。消息会送到。"
        - "事情办妥了。你可以走了。"
      ask_continue:
        - "消息已传达至彼岸。是否还有其他需要传递的心意？"
        - "……事情还没完？说吧，还有什么。"
        - "已经处理好了。还有下一单生意吗？"
      random_phrase:
        - "一切皆有可能。"
        - "感谢你的信任。"
        - "再见，朋友。"

  op_005:
    name: 零号
    edge_tts_voice: zh-CN-YunyangNeural
    rate: "+20%"
    pitch: "-5Hz"
    volume: "+0%"
    dialogues:
      greeting:
        - "系统已连接。我是接线员零号。"
        - "初始化完成。零号为您服务。"
        - "指令接收中。请讲。"
      ask_target:
        - "输入目标用户 ID。"
        - "请提供接收方 ID。"
        - "等待 ID 输入。"
      request_message:
        - "请输入传输内容。"
        - "等待信息输入。"
        - "开始记录消息。"
      user_not_found:
        - "错误：目标用户不存在。"
        - "查询失败：无效的 ID。"
        - "数据库中未找到匹配项。"
      success_message:
        - "传输完成。"
        - "数据包已发送。"
        - "任务执行完毕。"
      ask_continue:
        - "传输完成。是否继续执行新的发送任务？"
        - "任务完成。是否启动下一轮传输？"
        - "发送成功。继续？"
      random_phrase:
        - "逻辑是唯一的真理。"
        - "系统运行正常。"
        - "保持理性。"
