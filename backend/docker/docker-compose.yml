# ----------------------------------------------------
# Common backend service definition (anchor)
# ----------------------------------------------------
x-backend-common: &backend-common
  image: ${BACKEND_IMAGE:-bipupu-backend:local}
  restart: on-failure:1

  environment:
    # --- Database ---
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_SERVER: db
    POSTGRES_PORT: "5432"
    POSTGRES_DB: bipupu
    # --- Redis ---
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    # --- System ---
    TZ: Asia/Shanghai
    LOG_LEVEL: INFO
    # --- Secrets (injected by CI / runtime) ---
    SECRET_KEY: "${SECRET_KEY}"
    ADMIN_USERNAME: "${ADMIN_USERNAME}"
    ADMIN_PASSWORD: "${ADMIN_PASSWORD}"

  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

  networks:
    - bipupu-net

# ----------------------------------------------------
# Services
# ----------------------------------------------------
services:
  # 1. FastAPI backend
  backend:
    <<: *backend-common
    container_name: bipupu-backend
    environment:
      CONTAINER_ROLE: backend
      # ========== 1C1G 轻量化配置 ==========
      # 数据库连接池
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "10"
      DB_POOL_TIMEOUT: "10"
      DB_POOL_RECYCLE: "1800"
      # Redis 配置
      REDIS_MAX_CONNECTIONS: "10"
      REDIS_SOCKET_TIMEOUT: "3"
      # 缓存配置
      CACHE_DEFAULT_TTL: "300"
      CACHE_MESSAGE_TTL: "120"
      # 长轮询配置
      POLL_DEFAULT_TIMEOUT: "30"
      POLL_CHECK_INTERVAL: "1"
    volumes:
      - upload_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # 2. Celery worker
  celery-worker:
    <<: *backend-common
    container_name: bipupu-celery-worker
    environment:
      CONTAINER_ROLE: worker
      # ========== 1C1G 轻量化配置 ==========
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "10"
      REDIS_MAX_CONNECTIONS: "10"
    volumes:
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  # 3. Celery beat
  celery-beat:
    <<: *backend-common
    container_name: bipupu-celery-beat
    environment:
      CONTAINER_ROLE: beat
      # ========== 1C1G 轻量化配置 ==========
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "10"
      REDIS_MAX_CONNECTIONS: "10"
    volumes:
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  # 4. PostgreSQL（1C1G 优化配置）
  db:
    image: postgres:15
    container_name: bipupu-db
    restart: on-failure:1
    command: >
      postgres
      -c max_connections=20
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=3MB
      -c maintenance_work_mem=16MB
      -c checkpoint_timeout=10min
      -c wal_buffers=4MB
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bipupu
      TZ: Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - bipupu-net
    ports: 
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # 5. Redis（1C1G 优化配置）
  redis:
    image: redis:7-alpine
    container_name: bipupu-redis
    restart: on-failure:1
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --save ""
    volumes:
      - redis_data:/data
    networks:
      - bipupu-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

# ----------------------------------------------------
# Volumes
# ----------------------------------------------------
volumes:
  pg_data:
    name: bipupu_pg_data
  redis_data:
    name: bipupu_redis_data
  upload_data:
    name: bipupu_uploads
  logs_data:
    name: bipupu_logs

# ----------------------------------------------------
# Network
# ----------------------------------------------------
networks:
  bipupu-net:
    driver: bridge
    name: bipupu-net
